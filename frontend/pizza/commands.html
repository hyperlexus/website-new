<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>what da blue shelly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .custom-height { max-height: 80px; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-300 min-h-screen py-8 px-4">
    <div class="max-w-7xl mx-auto">
        <div class="mb-8 text-center">
            <h1 class="text-4xl font-bold text-indigo-400 tracking-tight">PizzaRomani Database</h1>
            <p class="text-slate-500 mt-2">database.json interface</p>
        </div>

        <div class="mb-6 max-w-md mx-auto relative">
            <input type="text" id="searchInput" onkeyup="filterTable()" 
                   placeholder="Search trigger or response..." 
                   class="w-full bg-[#1e293b] border border-slate-700 text-slate-200 px-5 py-3 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition shadow-lg">
        </div>

        <div class="bg-[#1e293b] rounded-3xl shadow-2xl border border-slate-800/50 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[800px]" id="commandsTable">
                    <thead>
                        <tr class="bg-[#131b2e] border-b border-slate-700">
                            <th class="w-[180px] px-6 py-5 text-xs font-bold text-indigo-400 uppercase tracking-widest">Time</th>
                            <th class="w-[150px] px-6 py-5 text-xs font-bold text-indigo-400 uppercase tracking-widest">Author</th>
                            <th class="px-6 py-5 text-xs font-bold text-indigo-400 uppercase tracking-widest">Trigger</th>
                            <th class="px-6 py-5 text-xs font-bold text-indigo-400 uppercase tracking-widest">Response</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-800/50">
                        </tbody>
                </table>
            </div>
            <div id="loading" class="p-20 text-center text-slate-600 font-mono animate-pulse">connecting...</div>
        </div>
    </div>

    <script>
        const userMap = {
            "422800248935546880": "hyperlexus",
            "649457215564152852": "alvideiectiones",
            "468786219258740756": "maggda420",
            "640985620948189186": "ad_infernum",
            "0": "added before pizza 2.0"
        };

        function formatDiscordTime(ms) {
            const date = new Date(parseInt(ms));
            return date.toLocaleString([], { 
                year: 'numeric', month: 'short', day: 'numeric', 
                hour: '2-digit', minute: '2-digit' 
            });
        }

        function filterTable() {
            const input = document.getElementById("searchInput");
            const filter = input.value.toLowerCase();
            const table = document.getElementById("commandsTable");
            const tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                const triggerCell = tr[i].getElementsByTagName("td")[2];
                const responseCell = tr[i].getElementsByTagName("td")[3];
                if (triggerCell || responseCell) {
                    const txtValue = (triggerCell.textContent || triggerCell.innerText) + " " + 
                                     (responseCell.textContent || responseCell.innerText);
                    tr[i].style.display = txtValue.toLowerCase().indexOf(filter) > -1 ? "" : "none";
                }
            }
        }

        async function fetchCommands() {
            try {
                const response = await fetch('https://api.hyperlexus.uk/api/bot/commands');
                const commands = await response.json();
                const tbody = document.getElementById('table-body');
                document.getElementById('loading').classList.add('hidden');

                commands.forEach(cmd => {
                    const row = document.createElement('tr');
                    row.className = "hover:bg-slate-800/30 transition-all duration-200 group";

                    const authorName = userMap[cmd.author] || cmd.author || "unknown";

                    row.innerHTML = `
                        <td class="px-6 py-4 text-xs text-slate-500 font-mono whitespace-nowrap">${formatDiscordTime(cmd.time)}</td>
                        <td class="px-6 py-4 text-sm font-semibold text-indigo-300">${authorName}</td>
                        <td class="px-6 py-4">
                            <div class="custom-height overflow-y-auto pr-2 text-sm font-mono text-cyan-400 break-words">
                                ${cmd.read}
                            </div>
                        </td>
                        <td class="px-6 py-4">
                            <div class="custom-height overflow-y-auto pr-2 text-sm text-slate-300 break-words bg-slate-900/40 p-3 rounded-xl border border-slate-800/50 group-hover:border-indigo-500/30 transition-all">
                                ${cmd.write}
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) {
                document.getElementById('loading').innerText = "Link Failure: " + err;
            }
        }
        fetchCommands();
    </script>
</body>
</html>
